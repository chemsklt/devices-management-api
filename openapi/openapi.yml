openapi: 3.0.3
info:
  title: Devices API
  description: REST API for managing devices
  version: 1.0.0

paths:
  /devices:
    post:
      summary: Create a new device
      responses:
        '201':
          description: Device created

    get:
      summary: Fetch All devices
      responses:
        '200':
          description: List of devices

  /devices/{id}:
    get:
      summary: Fetch a device by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device found

    delete:
      summary: Delete a device
      responses:
        '204':
          description: Device deleted