name: Java CI - Device API

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Build and run tests
        run: mvn -B -f devices-service/pom.xml clean verify
      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
            name: jacoco-report
            path: devices-service/target/site/jacoco/